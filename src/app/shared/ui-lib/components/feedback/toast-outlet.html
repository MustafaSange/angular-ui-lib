@if (hasToasts()) {
  <section class="ms-toast-region" aria-label="Notifications">
    @for (entry of entries(); track entry.id) {
      <article
        class="ms-toast"
        [class.ms-toast-info]="entry.kind === 'info'"
        [class.ms-toast-success]="entry.kind === 'success'"
        [class.ms-toast-warning]="entry.kind === 'warning'"
        [class.ms-toast-danger]="entry.kind === 'danger'"
        [attr.role]="getRole(entry.kind)"
        [attr.aria-live]="getAriaLive(entry.kind)"
        (mouseenter)="pauseHover(entry.id)"
        (mouseleave)="resumeHover(entry.id)"
        (focusin)="pauseFocus(entry.id)"
        (focusout)="resumeFocus(entry.id, $event)"
      >
        @if (entry.showIcon) {
          <span class="ms-toast-icon" aria-hidden="true">
            <span class="ms-icon ms-icon-filled">{{ getIcon(entry.kind) }}</span>
          </span>
        }

        <div class="ms-toast-content">
          @if (entry.title) {
            <strong class="ms-toast-title">{{ entry.title }}</strong>
          }
          <p class="ms-toast-message">{{ entry.message }}</p>
          @if (entry.action) {
            <button
              class="btn btn-ghost btn-sm ms-toast-action"
              type="button"
              (click)="runAction(entry.id)"
            >
              {{ entry.action.label }}
            </button>
          }
        </div>

        @if (entry.dismissible) {
          <button
            class="btn btn-ghost btn-icon btn-sm ms-toast-close"
            type="button"
            aria-label="Dismiss notification"
            (click)="close(entry.id)"
          >
            <span class="ms-icon" aria-hidden="true">close</span>
          </button>
        }
      </article>
    }
  </section>
}
