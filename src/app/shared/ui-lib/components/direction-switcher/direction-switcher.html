<div class="direction-switcher" role="group" aria-label="Layout direction">
  @for (option of options; track option.value) {
    <button
      type="button"
      class="direction-option"
      [class.is-active]="direction() === option.value"
      [attr.aria-pressed]="direction() === option.value"
      (click)="setDirection(option.value)"
    >
      {{ option.label }}
    </button>
  }
</div>
