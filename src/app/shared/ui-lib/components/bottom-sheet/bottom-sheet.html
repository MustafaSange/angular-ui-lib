@if (open()) {
  <div class="bottom-sheet">
    <button
      class="bottom-sheet-backdrop"
      type="button"
      aria-label="Close bottom sheet"
      [style.z-index]="backdropZIndex()"
      (click)="handleBackdropClick()"
    ></button>

    <section
      #panel
      class="bottom-sheet-panel"
      role="dialog"
      aria-modal="true"
      [id]="panelId"
      [attr.aria-label]="ariaLabel()"
      [attr.aria-labelledby]="ariaLabel() ? null : labelledby()"
      [style.--_bottom-sheet-block-size]="sizeValue().blockSize"
      [style.--_bottom-sheet-max-block-size]="sizeValue().maxBlockSize"
      [style.--_bottom-sheet-max-width]="maxWidth()"
      [style.z-index]="panelZIndex()"
      tabindex="-1"
      (keydown)="handlePanelKeydown($event)"
    >
      @if (showHandle()) {
        <div class="bottom-sheet-handle" aria-hidden="true"></div>
      }

      <header class="bottom-sheet-header">
        <div class="bottom-sheet-title-section">
          @if (title()) {
            <h2 class="bottom-sheet-title" [id]="titleId">{{ title() }}</h2>
          } @else {
            <span class="bottom-sheet-title" [id]="titleId"></span>
          }

          <div class="bottom-sheet-header-actions">
            <ng-content select="[slot='headerActions']" />
          </div>
        </div>

        @if (showCloseButton()) {
          <button
            class="btn btn-ghost btn-icon bottom-sheet-close-button"
            type="button"
            aria-label="Close bottom sheet"
            (click)="dismiss()"
          >
            <span class="ms-icon" aria-hidden="true">close</span>
          </button>
        }
      </header>

      <div class="bottom-sheet-content">
        <ng-content />
      </div>

      <footer class="bottom-sheet-footer">
        <ng-content select="[slot='footer']" />
      </footer>
    </section>
  </div>
}
