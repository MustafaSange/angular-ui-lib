<section class="showcase-code" [attr.data-language]="language()">
  <header class="showcase-code-header">
    <span class="showcase-code-label">{{ label() }}</span>
    <div class="showcase-code-actions">
      <button
        class="btn btn-ghost btn-sm"
        type="button"
        [attr.aria-expanded]="isExpanded()"
        (click)="toggleExpanded()"
      >
        @if (isExpanded()) {
          Hide Code
        } @else {
          Show Code
        }
      </button>
      <button class="btn btn-ghost btn-sm" type="button" (click)="copyCode()">
        @switch (copyState()) {
          @case ('copied') {
            Copied
          }
          @case ('failed') {
            Select Code
          }
          @default {
            Copy
          }
        }
      </button>
    </div>
  </header>
  @if (isExpanded()) {
    <pre><code [class]="'language-' + language()" [innerHTML]="highlightedCode()"></code></pre>
  }
</section>
