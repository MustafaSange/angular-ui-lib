<main class="component-page">
  <header class="component-header">
    <a class="btn btn-ghost back-link" routerLink="/"><span class="ms-icon back-link-icon" aria-hidden="true">arrow_back</span><span>Back to Home</span></a>
    <p class="eyebrow">Components</p>
    <h1>Radio</h1>
    <p class="description">
      Projected radio groups with hints, errors, disabled options, and label placement variants.
    </p>
  </header>

  <section class="component-section">
    <h2>Examples</h2>

<div class="showcase-preview">
      <ms-radio-group>
        <legend>Radio Group</legend>
        <ms-radio-control>
          <input type="radio" name="support-plan" value="starter" />
          <label>Starter</label>
          <ms-choice-hint>For small teams getting set up.</ms-choice-hint>
        </ms-radio-control>
        <ms-radio-control>
          <input type="radio" name="support-plan" value="growth" checked />
          <label>Growth</label>
          <ms-choice-hint>Priority support for active teams.</ms-choice-hint>
        </ms-radio-control>
        <ms-radio-control>
          <input type="radio" name="support-plan" value="enterprise" disabled />
          <label>Enterprise</label>
          <ms-choice-error>Contact sales to enable this plan.</ms-choice-error>
        </ms-radio-control>
        <ms-radio-control slot="label-before">
          <input type="radio" name="support-plan" value="custom" />
          <label>Label Before</label>
          <ms-choice-hint>Places text before the radio.</ms-choice-hint>
        </ms-radio-control>
      </ms-radio-group>
    </div>
    <app-showcase-code label="Radio Group" [code]="snippet" />
  </section>
</main>
