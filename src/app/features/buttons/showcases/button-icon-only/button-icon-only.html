<h2>Icon only</h2>
    <div class="button-row align-center">
      <button class="btn btn-primary btn-icon" aria-label="Primary action">
        <span aria-hidden="true">+</span>
      </button>
      <button class="btn btn-secondary btn-icon" aria-label="Secondary action">
        <span aria-hidden="true">+</span>
      </button>
      <button class="btn btn-outline btn-icon" aria-label="Outline action">
        <span aria-hidden="true">+</span>
      </button>
      <button class="btn btn-ghost btn-icon" aria-label="Ghost action">
        <span aria-hidden="true">+</span>
      </button>
      <button class="btn btn-danger btn-icon" aria-label="Danger action">
        <span aria-hidden="true">+</span>
      </button>
      <button class="btn btn-success btn-icon" aria-label="Success action">
        <span aria-hidden="true">+</span>
      </button>
    </div>
    <app-showcase-code label="Icon button" [code]="snippet" />
