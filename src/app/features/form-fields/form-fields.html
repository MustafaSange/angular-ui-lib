<main class="form-fields-page">
  <header class="form-fields-header">
    <a class="btn btn-ghost back-link" routerLink="/">← Back to home</a>
    <p class="eyebrow">Components</p>
    <h1>Form fields</h1>
    <p class="description">
      A visual pass over labels, native controls, support text, and field states.
    </p>
  </header>

  <section class="form-field-section">
    <h2>Examples</h2>
    <div class="showcase-pair-stack">
      <app-basic-text-field-showcase />
      <app-autocomplete-field-showcase />
      <app-signal-form-field-showcase />
      <app-required-email-field-showcase />
      <app-select-field-showcase />
      <app-field-with-hint-showcase />
      <app-textarea-field-showcase />
      <app-prefix-field-showcase />
      <app-suffix-field-showcase />
      <app-search-field-showcase />
      <app-field-actions-showcase />
      <app-segmented-suffix-action-showcase />
      <app-disabled-field-showcase />
      <app-readonly-field-showcase />
    </div>
  </section>

  <section class="form-field-section">
    <h2>Selection controls</h2>
    <div class="showcase-pair-stack">
      <app-checkbox-group-showcase />
      <app-radio-group-showcase />
      <app-switch-controls-showcase />
    </div>
  </section>
</main>
