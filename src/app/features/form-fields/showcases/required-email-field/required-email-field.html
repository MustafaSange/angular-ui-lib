<div class="showcase-preview">
  <ms-signal-form-field>
    <label for="email">Email address *</label>
    <input id="email" type="email" placeholder="ada@example.com" [formField]="emailField" />
    <ms-hint>Blur the empty field to show the required error.</ms-hint>
    <ms-error>{{ emailError() }}</ms-error>
  </ms-signal-form-field>

  <ms-signal-form-field>
    <label for="username">Username *</label>
    <input id="username" type="text" placeholder="ada_lovelace" [formField]="usernameField" />
    <ms-hint>Letters, numbers, or underscores. Minimum 3 characters.</ms-hint>
    <ms-error>{{ usernameError() }}</ms-error>
  </ms-signal-form-field>
</div>
<app-showcase-code label="Required and format validation" [code]="snippet" />
