<main class="component-page">
  <header class="component-header">
    <a class="btn btn-ghost back-link" routerLink="/">← Back to home</a>
    <p class="eyebrow">Components</p>
    <h1>Signal form field</h1>
    <p class="description">Label, control, hint, and error layout for Angular signal forms.</p>
  </header>

  <section class="component-section">
    <h2>Examples</h2>

    <div class="showcase-preview">
      <ms-signal-form-field>
        <label for="email">Email address</label>
        <input id="email" type="email" placeholder="ada@example.com" [formField]="emailField" />

        <ms-hint>
          Blur this field while it is empty to show the required error.
          <span slot="hint-extra">Required</span>
        </ms-hint>
      </ms-signal-form-field>

      <ms-signal-form-field>
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="ada_lovelace" [formField]="usernameField" />

        <ms-hint>Use letters, numbers, or underscores.</ms-hint>
      </ms-signal-form-field>
    </div>
    <app-showcase-code label="Signal form field validation" [code]="snippet" />
  </section>
</main>
